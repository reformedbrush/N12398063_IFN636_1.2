name: CI/CD Pipeline

on:
  push:
    branches: [ main, recovery-final ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Backend
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run backend
        run: |
          cd backend
          echo "Backend OK"

      # Frontend
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build || echo "Build skipped"
